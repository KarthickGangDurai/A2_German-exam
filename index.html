<script>
// ===================== AUDIO MANAGER =====================
let currentAudio = null;

function stopAllAudio() {
  if (currentAudio) {
    currentAudio.pause();
    currentAudio.currentTime = 0;
    currentAudio = null;
  }
  if (window.speechSynthesis) {
    window.speechSynthesis.cancel();
  }
}

function playNativeAudio(src, fallbackText, btnId) {
  stopAllAudio();
  const btn = document.getElementById(btnId);
  const box = document.getElementById(btnId.replace('btn-', 'box-'));

  const audio = new Audio(src);
  currentAudio = audio;

  audio.onplay = () => {
    if (box) box.classList.add('playing');
    if (btn) btn.innerHTML = '⏸️ Pause';
  };

  audio.onended = () => {
    if (box) box.classList.remove('playing');
    if (btn) btn.innerHTML = '▶️ Nochmal abspielen';
    currentAudio = null;
  };

  audio.onerror = () => {
    if (box) box.classList.remove('playing');
    if (btn) {
      btn.innerHTML = '⚠️ Audio nicht gefunden';
      btn.disabled = true;
    }
    showFallback(fallbackText, btnId);
  };

  audio.play().catch(() => {
    showFallback(fallbackText, btnId);
  });
}

function showFallback(fallbackText, btnId) {
  const btn = document.getElementById(btnId);
  if (!btn) return;
  const container = btn.parentElement;
  let fallbackBtn = document.getElementById(btnId + '-fallback');
  if (!fallbackBtn) {
    fallbackBtn = document.createElement('button');
    fallbackBtn.id = btnId + '-fallback';
    fallbackBtn.className = 'btn btn-outline fallback-btn';
    fallbackBtn.innerHTML = '🔊 Browser-TTS Fallback';
    fallbackBtn.onclick = () => speakGerman(fallbackText);
    container.appendChild(fallbackBtn);
  }
}

function speakGerman(text) {
  if (!window.speechSynthesis) {
    alert('Ihr Browser unterstützt keine Sprachausgabe. Bitte verwenden Sie Chrome, Edge oder Safari.');
    return;
  }
  window.speechSynthesis.cancel();

  const voices = window.speechSynthesis.getVoices();
  let deVoice = voices.find(v => v.name.includes('Google Deutsch')) 
    || voices.find(v => v.name.includes('Hedda')) 
    || voices.find(v => v.name.includes('Stefan')) 
    || voices.find(v => v.name.includes('Katja')) 
    || voices.find(v => v.lang && v.lang.startsWith('de'));

  const sentences = text.match(/[^\.!\?]+[\.!\?]+/g) || [text];

  sentences.forEach(sentence => {
    const utter = new SpeechSynthesisUtterance(sentence.trim());
    utter.lang = 'de-DE';
    utter.rate = 0.85;
    utter.pitch = 1.0;
    if (deVoice) utter.voice = deVoice;
    window.speechSynthesis.speak(utter);
  });
}

function toggleTranscript(id) {
  const el = document.getElementById(id);
  if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
}


function playTTS(text, btnId, boxId) {
  stopAllAudio();
  const btn = document.getElementById(btnId);
  const box = document.getElementById(boxId);

  if (btn) btn.innerHTML = '🔊 Playing...';
  if (box) box.classList.add('playing');

  speakGerman(text);

  // Estimate duration and reset button
  const words = text.split(/\s+/).length;
  const duration = words * 450; // ~450ms per word at slow rate

  setTimeout(() => {
    if (btn) btn.innerHTML = '🔊 Nochmal abspielen';
    if (box) box.classList.remove('playing');
  }, duration);
}

function playListeningTeil1(index) {
  const data = currentExam.listening.teil1[index];
  playTTS(data.audio, 'btn-l1-' + index, 'box-l1-' + index);
}

function playListeningTeil2() {
  const data = currentExam.listening.teil2;
  playTTS(data.audio, 'btn-l2', 'box-l2');
}

function playListeningTeil3(index) {
  const data = currentExam.listening.teil3[index];
  playTTS(data.audio, 'btn-l3-' + index, 'box-l3-' + index);
}

function playListeningTeil4() {
  const data = currentExam.listening.teil4;
  playTTS(data.audio, 'btn-l4', 'box-l4');
}

function checkAnswers(section, teil, questions, correctAnswers) {
  let score = 0;
  questions.forEach((q, i) => {
    const userVal = answers[section] && answers[section][teil] ? answers[section][teil][i] : undefined;
    const containerId = teil === 'teil1' ? (section==='reading'?'r1':'l1') : teil === 'teil2' ? 'r2' : teil === 'teil3' ? (section==='reading'?'r3':'l3') : (section==='reading'?'r4':'l4');
    const container = document.getElementById(`${containerId}-q${i}`);
    if (!container) return;

    const labels = container.querySelectorAll('label');
    labels.forEach(lbl => {
      lbl.classList.remove('correct', 'wrong');
      const input = lbl.querySelector('input');
      if (!input) return;

      let isCorrect;
      if (section === 'reading' && teil === 'teil4') {
        isCorrect = input.value === correctAnswers[i];
      } else if (section === 'listening' && teil === 'teil4') {
        isCorrect = input.value === String(correctAnswers[i]);
      } else {
        isCorrect = parseInt(input.value) === correctAnswers[i];
      }

      if (isCorrect) {
        lbl.classList.add('correct');
        if (input.checked) score++;
      } else if (input.checked) {
        lbl.classList.add('wrong');
      }
    });
  });

  // Show floating score
  const existing = document.getElementById('live-score');
  if (existing) existing.remove();
  const div = document.createElement('div');
  div.id = 'live-score';
  div.style.cssText = 'position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:var(--card); padding:12px 24px; border-radius:12px; box-shadow:var(--shadow); border:2px solid var(--primary); z-index:1000; font-weight:700; color:var(--primary);';
  div.innerHTML = `✅ ${score}/${questions.length} richtig`;
  document.body.appendChild(div);
  setTimeout(() => div.remove(), 4000);
}

function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function pickRandomSet(sets) {
  return sets[Math.floor(Math.random() * sets.length)];
}

function countWords(text) {
  return text.trim().split(/\s+/).filter(w => w.length > 0).length;
}

function formatTime(seconds) {
  const m = Math.floor(seconds / 60);
  const s = seconds % 60;
  return `${m}:${s.toString().padStart(2, '0')}`;
}

function startWritingTimer() {
  timers.writing = 30 * 60;
  startTimer('writing', timers.writing);
}
function startSpeakingTimer() {
  timers.speaking = 15 * 60;
  startTimer('speaking', timers.speaking);
}

function startTimer(name, seconds) {
  if (timerInterval) clearInterval(timerInterval);
  const update = () => {
    const el = document.getElementById('exam-timer');
    if (!el) return;
    el.textContent = `⏱️ ${formatTime(timers[name])}`;
    if (timers[name] <= 60) el.className = 'timer danger';
    else if (timers[name] <= 300) el.className = 'timer warning';
    else el.className = 'timer';
    if (timers[name] <= 0) {
      clearInterval(timerInterval);
      alert('Time is up!');
      finishSection();
    }
    timers[name]--;
  };
  update();
  timerInterval = setInterval(update, 1000);
}

function stopTimer() {
  if (timerInterval) clearInterval(timerInterval);
}

let selectedL2Pic = null;

function assignL2Day(dayIndex) {
  if (selectedL2Pic === null) {
    alert('Wählen Sie zuerst eine Aktivität aus!');
    return;
  }
  const data = currentExam.listening.teil2;
  if (!answers.listening) answers.listening = {};

  answers.listening.teil2[dayIndex] = selectedL2Pic;
  const dayEl = document.getElementById(`l2-day-${dayIndex}`);
  dayEl.textContent = data.pictures[selectedL2Pic];
  dayEl.style.color = 'var(--text)';
  document.getElementById(`l2-row-${dayIndex}`).classList.add('assigned');
}

function clearL2Day(dayIndex) {
  if (answers.listening && answers.listening.teil2) {
    delete answers.listening.teil2[dayIndex];

  const dayEl = document.getElementById(`l2-day-${dayIndex}`);
  dayEl.textContent = '(noch nicht zugeordnet – hier klicken)';
  dayEl.style.color = 'var(--text-light)';
  document.getElementById(`l2-row-${dayIndex}`).classList.remove('assigned');
}

function updateWordCount(textId, countId, min, max) {
  const text = document.getElementById(textId).value;
  const count = countWords(text);
  const el = document.getElementById(countId);
  el.textContent = `${count} Wörter (Ziel: ${min}-${max})`;
  if (count >= min && count <= max) el.className = 'word-count ok';
  else if (count > max) el.className = 'word-count warning';
  else el.className = 'word-count';
}

function saveWriting(teil, textId) {
  const text = document.getElementById(textId).value;
  if (!answers.writing) answers.writing = {};
  answers.writing[teil] = text;
}

function restoreWriting(teil, textId, countId) {
  if (answers.writing && answers.writing[teil] !== undefined) {
    const el = document.getElementById(textId);
    if (el) {
      el.value = answers.writing[teil];
      updateWordCount(textId, countId, 
        currentExam.writing[teil].minWords, 
        currentExam.writing[teil].maxWords);
    }
  }
}

  }, 1000);

// ===================== ANSWERS =====================
function saveAnswer(section, teil, question, answer) {
  if (!answers[section]) answers[section] = {};
  if (!answers[section][teil]) answers[section][teil] = {};
  answers[section][teil][question] = answer;
}

function restoreAnswers(section, teil, count) {
  if (!answers[section] || !answers[section][teil]) return;
  for (let i = 0; i < count; i++) {
    const val = answers[section][teil][i];
    if (val !== undefined) {
      const radios = document.getElementsByName(`${teil === 'teil1' ? (section === 'reading' ? 'r1' : 'l1') : teil === 'teil2' ? 'r2' : teil === 'teil3' ? 'r3' : teil === 'teil4' ? 'r4' : 'l3'}-q${i}`);
      for (let r of radios) {
        if (r.value == val) r.checked = true;
      }
    }
  }
}

function restoreReadingTeil4Answers(ads) {
  if (!answers.reading || !answers.reading.teil4) return;
  Object.entries(answers.reading.teil4).forEach(([q, val]) => {
    const radios = document.getElementsByName(`r4-q${q}`);
    for (let r of radios) {
      if (r.value === val) r.checked = true;
    }
  });
}

    html += `<h3>Teil 3 – Gemeinsam planen</h3>`;

    html += `<div class="hint-box">💡 Üben Sie diese Sätze laut. Sie sind die wichtigsten für das A2-Gespräch!</div>`;
  }
  
  html += `<div class="nav-buttons"><button class="btn btn-outline" onclick="renderHome()">🏠 Startseite</button><button class="btn btn-primary" onclick="currentExam=null; startSection('${section}')">🔄 Neue Aufgabe</button></div>`;
  html += `</div></div>`;
  document.getElementById('app').innerHTML = html;
}

// ===================== RESULTS =====================
function showResults() {
  stopTimer();
  stopSpeakingTimer();
  let readingScore = 0, listeningScore = 0, writingScore = 0, speakingScore = 0;
  let readingMax = 25, listeningMax = 20, writingMax = 20, speakingMax = 25;

  if (currentExam.reading && answers.reading) {
    const r = currentExam.reading;
    const a = answers.reading;
    if (a.teil1) r.teil1.questions.forEach((q, i) => { if (a.teil1[i] === q.answer) readingScore += 1; });
    if (a.teil2) r.teil2.questions.forEach((q, i) => { if (a.teil2[i] === q.answer) readingScore += 1; });
    if (a.teil3) r.teil3.questions.forEach((q, i) => { if (a.teil3[i] === q.answer) readingScore += 1; });
    if (a.teil4) r.teil4.people.forEach((p, i) => { if (a.teil4[i] === p.match) readingScore += 1; });
  }

  if (currentExam.listening && answers.listening) {
    const l = currentExam.listening;
    const a = answers.listening;
    if (a.teil1) l.teil1.forEach((q, i) => { if (a.teil1[i] === q.answer) listeningScore += 1; });
    if (a.teil2 && a.teil2) {
      l.teil2.answers.forEach((ans, i) => { if (a.teil2[i] === ans) listeningScore += 1; });
    }
    if (a.teil3) l.teil3.forEach((q, i) => { if (a.teil3[i] === q.answer) listeningScore += 1; });
    if (a.teil4) l.teil4.statements.forEach((s, i) => { if (a.teil4[i] === s.answer) listeningScore += 1; });
  }

  let writingFeedback = '';
  if (currentExam.writing && answers.writing) {
    const w = currentExam.writing;
    const a = answers.writing;
    if (a.teil1 !== undefined) {
      const count = countWords(a.teil1);
      const ok = count >= w.teil1.minWords && count <= w.teil1.maxWords;
      writingFeedback += `<p><strong>Teil 1 (SMS):</strong> ${count} Wörter – ${ok ? '✅ Wortzahl OK' : '⚠️ Wortzahl passt nicht'}</p>`;
    }
    if (a.teil2 !== undefined) {
      const count = countWords(a.teil2);
      const ok = count >= w.teil2.minWords && count <= w.teil2.maxWords;
      writingFeedback += `<p><strong>Teil 2 (E-Mail):</strong> ${count} Wörter – ${ok ? '✅ Wortzahl OK' : '⚠️ Wortzahl passt nicht'}</p>`;
    }
  }

  const total = readingScore + listeningScore + writingScore + speakingScore;
  const maxTotal = readingMax + listeningMax + writingMax + speakingMax;
  const percent = Math.round((total / maxTotal) * 100);
  const passed = percent >= 60;

  document.getElementById('app').innerHTML = `
    <div class="container">
      <div class="card fade-in result-summary">
        <h1>🎯 Ergebnis</h1>
        <div class="score-circle ${passed ? 'pass' : 'fail'}">${percent}%</div>
        <p style="font-size:1.2rem; margin-bottom:8px;">${passed ? '🎉 Bestanden!' : '❌ Nicht bestanden'}</p>
        <p style="color:var(--text-light)">Benötigt: 60% | Sie haben: ${total}/${maxTotal} Punkte</p>
      </div>

      <div class="card fade-in">
        <h2>📊 Detailauswertung</h2>
        <table>
          <tr><th>Modul</th><th>Punkte</th><th>Max</th><th>Status</th></tr>
          <tr>
            <td>📖 Lesen</td><td>${readingScore}</td><td>${readingMax}</td>
            <td>${readingScore >= 15 ? '✅' : '⚠️'}</td>
          </tr>
          <tr>
            <td>🎧 Hören</td><td>${listeningScore}</td><td>${listeningMax}</td>
            <td>${listeningScore >= 12 ? '✅' : '⚠️'}</td>
          </tr>
          <tr>
            <td>✍️ Schreiben</td><td>–</td><td>${writingMax}</td>
            <td>Selbstbewertung</td>
          </tr>
          <tr>
            <td>🗣️ Sprechen</td><td>–</td><td>${speakingMax}</td>
            <td>Selbstbewertung</td>
          </tr>
        </table>
        <div style="margin-top:16px; padding:16px; background:#f0f7fa; border-radius:8px;">
          <h3>✍️ Schreiben – Feedback</h3>
          ${writingFeedback || '<p style="color:var(--text-light)">Keine Daten vorhanden</p>'}
          <p style="margin-top:8px; font-size:0.9rem; color:var(--text-light)">
            Hinweis: Die Schreibaufgaben werden nicht automatisch korrigiert. Achten Sie auf Wortzahl, alle drei Punkte zu beantworten, und korrekte Grammatik.
          </p>
        </div>
        <div style="margin-top:16px; padding:16px; background:#f0f7fa; border-radius:8px;">
          <h3>🗣️ Sprechen – Selbstbewertung</h3>
          <p style="font-size:0.9rem; color:var(--text-light)">
            Beurteilen Sie sich selbst: Haben Sie alle Punkte angesprochen? Sätze gebildet? Aussprache verständlich?
          </p>
        </div>
        <div style="display:flex; gap:10px; flex-wrap:wrap; margin-top:20px;">
          <button class="btn btn-outline" onclick="renderSectionReview('reading')">📖 Lesen Review</button>
          <button class="btn btn-outline" onclick="renderSectionReview('listening')">🎧 Hören Review</button>
          <button class="btn btn-outline" onclick="renderSectionReview('writing')">✍️ Schreiben Review</button>
          <button class="btn btn-outline" onclick="renderSectionReview('speaking')">🗣️ Sprechen Review</button>
        </div>
      </div>

      <div class="card fade-in">
        <h2>🔄 Neue Prüfung starten</h2>
        <p>Jede Prüfung verwendet zufällig ausgewählte Aufgaben aus 10 Sets.</p>
        <div class="nav-buttons">
          <button class="btn btn-primary" onclick="startFullExam()">Komplette Prüfung</button>
          <button class="btn btn-outline" onclick="renderHome()">Zur Startseite</button>
        </div>
      </div>
    </div>
  `;
}

function finishSection() {
  if (currentSection === 'reading') finishReading();
  else if (currentSection === 'listening') finishListening();
  else if (currentSection === 'writing') finishWriting();
  else if (currentSection === 'speaking') finishSpeaking();
}

// ===================== INIT =====================
window.addEventListener('beforeunload', stopAllAudio);
renderHome();
